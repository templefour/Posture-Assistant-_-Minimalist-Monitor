name = "posture-assistant"
compatibility_date = "2024-12-01"

# Pages 项目配置
pages_build_output_dir = "public"

# KV Namespace 绑定
# 需要先在 Cloudflare Dashboard 创建名为 "posture-kv" 的 KV Namespace
# 命令: wrangler kv:namespace create "POSTURE_KV"
# 然后把返回的 id 填到下面
[[kv_namespaces]]
binding = "POSTURE_KV"
id = "1f68faaab4e3487e9629821ba358585f"
